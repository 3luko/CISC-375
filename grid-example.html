<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid Example</title>
    <style>
        #grid-container {
            display: grid;
            grid-template-columns: auto auto auto;
            margin: 15px;
        }
        #grid-container > div { 
            text-align: center; 
            background: rgb(205, 214, 212); 
            border: 3px solid rgb(30, 188, 202); 
            padding: 20px;
        }
    </style>
</head>
<body>
  <div class = "container">
  <header>Header</header>
  <main>
    <h1>Main</h1>
    <div id="grid-container"> 
        <div>1</div>
        <div>2</div> 
        <div>3</div> 
        <div>4</div> 
        <div>5</div> 
        <div>6</div>
    </div>
        <div id="grid-container"> 
        <div>A</div>
        <div>B</div> 
        <div>C</div> 
        <div>D</div> 
        <div>E</div> 
        <div>F</div>
        <div>G</div>
        <div>H</div>
    </div>
    <p>Main content…</p>
  </main>
  <aside>
    <h2>Aside</h2>
    <p>Related content</p>
  </aside>
  <footer>Footer</footer>
</div>
</body>
</html>
